services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bharat}
      POSTGRES_DB: ${POSTGRES_DB:-bharat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bharat} -d ${POSTGRES_DB:-bharat}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-bookworm
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-bharat}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bharat}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      FINBERT_HOST: ${FINBERT_HOST:-http://host.docker.internal:8765}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      TZ: ${TZ:-Asia/Kolkata}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  redis_data:
